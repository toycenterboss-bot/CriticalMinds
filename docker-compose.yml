services:
  db:
    image: postgres:16-alpine
    container_name: optika-db
    environment:
      POSTGRES_USER: optika
      POSTGRES_PASSWORD: ${DB_PASSWORD:-optika_dev_pass}
      POSTGRES_DB: optika
    ports:
      - "5432:5432"
    volumes:
      - optika_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optika"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  optika_pgdata:
